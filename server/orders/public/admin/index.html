<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Грядка · Заказы</title>
  <style>
    :root {
      --bg: #f6f5f0;
      --surface: #ffffff;
      --ink: #23301f;
      --ink2: #6b7565;
      --line: #e4e2d8;
      --accent: #3e7d34;
      --danger: #b3392f;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      padding: 24px;
    }
    h1 { font-size: 22px; margin-bottom: 16px; }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    input, select, button {
      font: inherit;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: var(--surface);
      color: var(--ink);
    }
    input:focus, select:focus { outline: 2px solid var(--accent); border-color: transparent; }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); cursor: pointer; }
    button.ghost { cursor: pointer; }
    #searchInput { flex: 1; min-width: 220px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line); vertical-align: top; }
    th { color: var(--ink2); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    tr:last-child td { border-bottom: none; }
    .items { color: var(--ink2); font-size: 13px; }
    .status { border-radius: 999px; padding: 6px 10px; }
    .status.created    { background: #eef4ec; }
    .status.confirmed  { background: #e4f0e2; }
    .status.delivering { background: #fdf3d8; }
    .status.delivered  { background: #dcefdc; }
    .status.cancelled  { background: #f7e2e0; color: var(--danger); }
    .muted { color: var(--ink2); }
    #error { color: var(--danger); margin-top: 8px; display: none; }
    .total { font-weight: 600; white-space: nowrap; }
    @media (max-width: 760px) {
      body { padding: 10px; }
      th:nth-child(4), td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>
  <h1>🥕 Грядка — заказы</h1>

  <div class="panel" id="loginPanel">
    <div class="row">
      <input type="password" id="passwordInput" placeholder="Пароль" style="flex:1; min-width:260px;">
      <button class="primary" id="loginBtn">Войти</button>
    </div>
    <div id="error"></div>
  </div>

  <div class="panel" id="ordersPanel" style="display:none;">
    <div class="row" style="margin-bottom:12px;">
      <input type="search" id="searchInput" placeholder="Поиск: номер, телефон, адрес, статус…">
      <button class="ghost" id="refreshBtn">Обновить</button>
      <button class="ghost" id="logoutBtn">Выйти</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>№</th>
          <th>Дата</th>
          <th>Телефон</th>
          <th>Адрес</th>
          <th>Состав</th>
          <th>Сумма</th>
          <th>Статус</th>
        </tr>
      </thead>
      <tbody id="ordersBody"></tbody>
    </table>
    <p class="muted" id="emptyNote" style="display:none; padding:12px;">Заказов не найдено</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
